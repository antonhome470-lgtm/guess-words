{% extends "base.html" %}

{% block content %}
<div class="finish-container">
    <div class="finish-card">
        <div class="fireworks">🎆🎇🎆</div>
        <div class="trophy">🏆</div>
        <h1>Поздравляем, {{ username }}!</h1>
        <p class="finish-subtitle">Вы прошли все уровни!</p>

        <div class="final-score">
            <div class="score-number">{{ total_score }}</div>
            <div class="score-label">Итоговый счёт</div>
        </div>

        <div class="finish-stats">
            <div class="stat">
                <span class="stat-icon">📝</span>
                <span class="stat-value">{{ total_words }}</span>
                <span class="stat-label">Слов угадано</span>
            </div>
            <div class="stat">
                <span class="stat-icon">🎁</span>
                <span class="stat-value">{{ total_bonus }}</span>
                <span class="stat-label">Бонусных слов</span>
            </div>
            <div class="stat">
                <span class="stat-icon">💡</span>
                <span class="stat-value">{{ total_hints }}</span>
                <span class="stat-label">Подсказок</span>
            </div>
            <div class="stat">
                <span class="stat-icon">🔥</span>
                <span class="stat-value">{{ best_streak }}</span>
                <span class="stat-label">Лучшая серия</span>
            </div>
        </div>

        <form method="POST" action="{{ url_for('reset_game') }}">
            <button type="submit" class="btn btn-primary btn-large">
                🔄 Играть заново
            </button>
        </form>
    </div>
</div>
{% endblock %}
